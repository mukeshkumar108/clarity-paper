services:
  postgres:
    image: postgres:16-alpine
    container_name: clarity-paper-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clarity_paper
    ports:
      - "5435:5432"
    volumes:
      - clarity_paper_postgres_data:/var/lib/postgresql/data

volumes:
  clarity_paper_postgres_data:
